<body>

<div id="brand-header">
    <h1>404 Page Not Found</h1>
</div>

<div id="game-container">
    <div id="score-board"><span id="hi-score">HI 00000</span><span id="current-score">00000</span></div>
    
    <div id="message-overlay">
        <div id="error-title">404</div>
        <div id="game-over-text">PAGE NOT FOUND</div>
        <div id="instructions-text">Press SPACE / Click Play Button to challenge obstacles. Duck using DOWN Arrow.</div>
        <div id="restart-btn" onclick="resetGame()"><div class="play-icon"></div></div>
    </div>

    <!-- Dino Character Container Matrix -->
    <div id="dino-sprite">
        <div id="dino-body" class="sprite dino-stand"></div>
        <div id="dino-legs" class="sprite leg-left-down"></div>
    </div>

    <div id="ground-line"></div>
</div>

<div id="footer-credit">
    Powered by <a href="https://netcoder.in" target="_blank" rel="noopener">Netcoder Technology</a>
</div>

<script>
const container = document.getElementById("game-container");
const dino = document.getElementById("dino-sprite");
const dinoBody = document.getElementById("dino-body");
const dinoLegs = document.getElementById("dino-legs");
const currentScoreEl = document.getElementById("current-score");
const hiScoreEl = document.getElementById("hi-score");
const msgOverlay = document.getElementById("message-overlay");
const gameOverText = document.getElementById("game-over-text");
const errorTitle = document.getElementById("error-title");
const instructionsText = document.getElementById("instructions-text");
const restartBtn = document.getElementById("restart-btn");

// Application Configuration Parameters
let gameActive = false;
let isStarted = false;
let score = 0;
let highScore = parseInt(localStorage.getItem("kd_dino_hi") || "0");
let gameSpeed = 6;
const maxSpeed = 14;

let yPosition = 0;
let verticalVelocity = 0;
const gravity = 0.6;
const jumpImpact = -10;

let isDucking = false;
let animationFrameCounter = 0;

const obstacles = [];
const clouds = [];
const groundBumps = [];

let nextObstacleTimer = 0;
let nextCloudTimer = 0;

// Initialize Scores
hiScoreEl.textContent = "HI " + String(highScore).padStart(5, "0");

// Legacy Audio Processing Framework
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if(type === 'jump') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if(type === 'hit') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if(type === 'score') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(520, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.type = 'square'; osc2.frequency.setValueAtTime(650, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain2.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc2.start(); osc2.stop(audioCtx.currentTime + 0.1);
        }, 80);
    }
}

// Global Key Listeners
const keyStates = {};
document.addEventListener("keydown", e => {
    keyStates[e.code] = true;
    if((e.code === "Space" || e.code === "ArrowUp") && gameActive && yPosition === 0 && !isDucking) {
        verticalVelocity = jumpImpact;
        playSound('jump');
    }
    if(!isStarted && (e.code === "Space" || e.code === "ArrowUp")) {
        startGame();
    }
    if(e.code === "ArrowDown" && gameActive && yPosition === 0) {
        isDucking = true;
    }
    if(e.code === "Space" && !gameActive && isStarted && gameOverText.textContent === "G A M E  O V E R") {
        resetGame();
    }
    if(["Space", "ArrowUp", "ArrowDown"].includes(e.code)) e.preventDefault();
});

document.addEventListener("keyup", e => {
    keyStates[e.code] = false;
    if(e.code === "ArrowDown") {
        isDucking = false;
    }
});

function startGame() {
    isStarted = true;
    gameActive = true;
    errorTitle.style.display = "none";
    instructionsText.style.display = "none";
    gameOverText.style.display = "none";
    restartBtn.style.display = "none";
    msgOverlay.style.display = "none";
    loop();
}

function resetGame() {
    // If not started yet, trigger initial start logic
    if(!isStarted) {
        startGame();
        return;
    }
    obstacles.forEach(o => o.el.remove());
    clouds.forEach(c => c.el.remove());
    groundBumps.forEach(b => b.el.remove());
    obstacles.length = 0;
    clouds.length = 0;
    groundBumps.length = 0;
    
    score = 0;
    gameSpeed = 6;
    yPosition = 0;
    verticalVelocity = 0;
    isDucking = false;
    gameActive = true;
    
    document.body.classList.remove("dark-mode");
    errorTitle.style.display = "none";
    instructionsText.style.display = "none";
    gameOverText.style.display = "none";
    restartBtn.style.display = "none";
    msgOverlay.style.display = "none";
    
    loop();
}

function triggerGameOver() {
    gameActive = false;
    playSound('hit');
    if(score > highScore) {
        highScore = score;
        localStorage.setItem("kd_dino_hi", highScore);
        hiScoreEl.textContent = "HI " + String(highScore).padStart(5, "0");
    }
    
    // Dead State cross eye overlay modification
    dinoBody.className = "sprite dino-stand";
    dinoBody.style.boxShadow += `, 26px 4px #ff0000, 28px 2px #ff0000`; 
    
    errorTitle.style.display = "block";
    errorTitle.textContent = "404";
    gameOverText.textContent = "G A M E  O V E R";
    gameOverText.style.display = "block";
    restartBtn.style.display = "flex";
    msgOverlay.style.display = "block";
}

// Spawning Engine Context
function processSpawns() {
    nextObstacleTimer--;
    if(nextObstacleTimer <= 0) {
        let type = Math.random() > 0.5 ? 'event-chair-stack' : 'tent-marquee-pole';
        let customAltitude = 0;
        
        // Flying canopy decorations fly over past 400 points 
        if(score > 400 && Math.random() > 0.75) {
            type = 'flying-drape';
            const roll = Math.random();
            customAltitude = roll > 0.6 ? 65 : (roll > 0.3 ? 40 : 10);
        }
        
        const element = document.createElement("div");
        if(type === 'flying-drape') {
            element.className = "flying-drape drape-wing-up";
            element.style.bottom = (15 + customAltitude) + "px";
        } else {
            element.className = `obstacle ${type}`;
        }
        element.style.left = "600px";
        container.appendChild(element);
        
        obstacles.push({
            el: element,
            type: type,
            x: 600,
            width: type === 'flying-drape' ? 42 : (type === 'tent-marquee-pole' ? 26 : 16),
            height: type === 'flying-drape' ? 20 : (type === 'tent-marquee-pole' ? 48 : 34),
            y: customAltitude,
            wingFrame: 0
        });
        
        nextObstacleTimer = 45 + Math.random() * 65 - (gameSpeed * 1.8);
    }

    nextCloudTimer--;
    if(nextCloudTimer <= 0) {
        const cloudEl = document.createElement("div");
        cloudEl.className = "cloud";
        cloudEl.style.top = (20 + Math.random() * 45) + "px";
        cloudEl.style.left = "600px";
        container.appendChild(cloudEl);
        clouds.push({ el: cloudEl, x: 600, speed: 0.4 + Math.random()*0.5 });
        nextCloudTimer = 140 + Math.random() * 140;
    }

    if(Math.random() > 0.93) {
        const bumpEl = document.createElement("div");
        bumpEl.className = "ground-bump";
        bumpEl.style.width = (2 + Math.floor(Math.random() * 7)) + "px";
        bumpEl.style.left = "600px";
        container.appendChild(bumpEl);
        groundBumps.push({ el: bumpEl, x: 600 });
    }
}

// Runtime Game Loop Loop Framework
function loop() {
    if(!gameActive) return;

    requestAnimationFrame(loop);
    animationFrameCounter++;
    
    // Scoring logic
    score += 0.15;
    let roundedScore = Math.floor(score);
    currentScoreEl.textContent = String(roundedScore).padStart(5, "0");

    if(roundedScore > 0 && roundedScore % 100 === 0 && Math.floor(score - 0.15) % 100 !== 0) {
        playSound('score');
    }

    // Dynamic Night Mode Cycle logic
    if(Math.floor(roundedScore / 700) % 2 === 1) {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

    if(gameSpeed < maxSpeed) gameSpeed += 0.0018;

    processSpawns();

    // Gravity calculation models
    if(yPosition > 0 || verticalVelocity < 0) {
        verticalVelocity += gravity;
        yPosition -= verticalVelocity;
        if(yPosition < 0) {
            yPosition = 0;
            verticalVelocity = 0;
        }
    }

    // Sprite Mapping States updates
    dino.style.bottom = (15 + yPosition) + "px";
    
    if(yPosition > 0) {
        dinoBody.className = "sprite dino-stand";
        dinoLegs.className = "sprite"; 
    } else if(isDucking) {
        dinoBody.className = "sprite dino-duck";
        dinoLegs.className = ""; 
        dino.style.width = "59px";
        dino.style.height = "30px";
    } else {
        dino.style.width = "44px";
        dino.style.height = "47px";
        dinoBody.className = "sprite dino-stand";
        if(Math.floor(animationFrameCounter / 6) % 2 === 0) {
            dinoLegs.className = "sprite leg-left-down";
        } else {
            dinoLegs.className = "sprite leg-right-down";
        }
    }

    // Translation Vector loops
    for(let i = groundBumps.length - 1; i >= 0; i--) {
        let b = groundBumps[i];
        b.x -= gameSpeed;
        b.el.style.left = b.x + "px";
        if(b.x < -20) { b.el.remove(); groundBumps.splice(i, 1); }
    }

    for(let i = clouds.length - 1; i >= 0; i--) {
        let c = clouds[i];
        c.x -= c.speed;
        c.el.style.left = c.x + "px";
        if(c.x < -50) { c.el.remove(); clouds.splice(i, 1); }
    }

    // AABB Bounds detection
    const playerBox = isDucking ? 
        { left: 50, right: 109, bottom: 15 + yPosition, top: 15 + yPosition + 30 } :
        { left: 50, right: 94, bottom: 15 + yPosition, top: 15 + yPosition + 47 };

    const padding = 5; 

    for(let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= gameSpeed;
        o.el.style.left = o.x + "px";

        if(o.type === 'flying-drape') {
            o.wingFrame++;
            if(Math.floor(o.wingFrame / 10) % 2 === 0) {
                o.el.className = "flying-drape drape-wing-up";
            } else {
                o.el.className = "flying-drape drape-wing-down";
            }
        }

        if(o.x < -50) {
            o.el.remove();
            obstacles.splice(i, 1);
            continue;
        }

        let obsBottom = 15 + o.y;
        let obsTop = obsBottom + o.height;
        let obsLeft = o.x;
        let obsRight = o.x + o.width;

        if (
            playerBox.left + padding < obsRight &&
            playerBox.right - padding > obsLeft &&
            playerBox.bottom + padding < obsTop &&
            playerBox.top - padding > obsBottom
        ) {
            triggerGameOver();
        }
    }
}
</script>
